<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>订阅更新</title>
    <link rel="stylesheet" href="/subadmin/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="hero-text">
          <h1>订阅更新</h1>
          <p>开启机场订阅、拉取原始配置、转换并发布给设备。</p>
        </div>
        <button id="updateButton" type="button" class="btn-primary">立即更新全部</button>
      </header>

      <section class="card login-card" id="loginPanel">
        <label class="field" for="tokenInput">
          <span>管理口令</span>
          <div class="token-row">
            <input id="tokenInput" type="password" autocomplete="current-password" placeholder="输入 ADMIN_TOKEN" />
            <button id="saveTokenButton" type="button" class="btn-primary">保存</button>
          </div>
        </label>
      </section>

      <section class="stat-grid">
        <article class="card stat">
          <span class="stat-label">状态</span>
          <strong id="status">读取中</strong>
          <p id="lastMessage">正在连接服务...</p>
        </article>
        <article class="card stat">
          <span class="stat-label">最近成功</span>
          <strong id="lastSucceededAt">-</strong>
          <p id="publishedBytes">-</p>
        </article>
        <article class="card stat">
          <span class="stat-label">订阅档案</span>
          <strong id="profileCount">-</strong>
          <p>每个客户端使用自己的固定地址。</p>
        </article>
      </section>

      <details class="card collapse" open>
        <summary>
          <span class="summary-title">设备订阅地址</span>
          <span class="summary-tools">
            <button id="copyAllButton" type="button" class="btn-ghost">复制全部</button>
            <span class="chevron" aria-hidden="true"></span>
          </span>
        </summary>
        <div class="collapse-body">
          <div id="profilesList" class="profiles-list"></div>
        </div>
      </details>

      <details class="card collapse" open>
        <summary>
          <span class="summary-title">机场</span>
          <span class="summary-tools">
            <button id="addProviderButton" type="button" class="btn-ghost">+ 添加机场</button>
            <span class="chevron" aria-hidden="true"></span>
          </span>
        </summary>
        <div class="collapse-body">
          <p class="hint">同一机场下的订阅共用同一套筛选与重命名规则。订阅在下方“订阅设置”里选择所属机场。</p>
          <div id="providersList" class="providers-list"></div>
        </div>
      </details>

      <details class="card collapse" open>
        <summary>
          <span class="summary-title">订阅设置</span>
          <span class="summary-tools">
            <button id="saveSettingsButton" type="button" class="btn-primary">保存设置</button>
            <span class="chevron" aria-hidden="true"></span>
          </span>
        </summary>
        <div class="collapse-body">
          <div class="settings-grid">
            <label class="field">
              <span>订阅转换地址</span>
              <input id="converterUrlInput" type="url" placeholder="https://sub.dler.io/sub" />
            </label>
            <label class="field">
              <span>分流模板地址</span>
              <input id="templateUrlInput" type="url" placeholder="https://example.com/rules.ini" />
            </label>
            <label class="field">
              <span>转换输入</span>
              <div class="segmented" id="converterInputSegmented" role="tablist">
                <button type="button" data-value="provider-url">直接用机场链接</button>
                <button type="button" data-value="hosted-raw">先下载到 VPS</button>
              </div>
            </label>
            <label class="field">
              <span>额外参数</span>
              <input id="extraParamsInput" type="text" placeholder="emoji=true&udp=true&list=false" />
            </label>
          </div>

          <div class="profiles-editor" id="profilesEditor"></div>
        </div>
      </details>

      <details class="card collapse">
        <summary>
          <span class="summary-title">更新日志</span>
          <span class="summary-tools">
            <button id="refreshButton" type="button" class="btn-ghost">刷新</button>
            <span class="chevron" aria-hidden="true"></span>
          </span>
        </summary>
        <div class="collapse-body">
          <ol id="logs" class="logs"></ol>
        </div>
      </details>
    </main>

    <script src="/subadmin/app.js" type="module"></script>
  </body>
</html>
