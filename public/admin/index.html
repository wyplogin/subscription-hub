<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>订阅更新</title>
    <link rel="stylesheet" href="/subadmin/styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">订</span>
        <span class="brand-name">订阅更新</span>
      </div>

      <nav class="nav">
        <button type="button" class="nav-item active" data-view="overview">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 13h8V3H3v10Zm0 8h8v-6H3v6Zm10 0h8V11h-8v10Zm0-18v6h8V3h-8Z"/></svg>
          <span>概览</span>
        </button>
        <button type="button" class="nav-item" data-view="providers">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 4 5v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V5l-8-3Z"/></svg>
          <span>机场</span>
        </button>
        <button type="button" class="nav-item" data-view="settings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm9 4-2.1-1.2.5-2.4-2.2-1.3-1.9 1.5-2.3-.9V5h-2.6l-.6 2.2-2.3.9-1.9-1.5-2.2 1.3.5 2.4L1 12l2.1 1.2-.5 2.4 2.2 1.3 1.9-1.5 2.3.9L11.4 19h2.6l.6-2.2 2.3-.9 1.9 1.5 2.2-1.3-.5-2.4L21 12Z"/></svg>
          <span>订阅设置</span>
        </button>
        <button type="button" class="nav-item" data-view="logs">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v3H4V4Zm0 6.5h16v3H4v-3ZM4 17h10v3H4v-3Z"/></svg>
          <span>更新日志</span>
        </button>
      </nav>

      <div class="sidebar-footer" id="loginPanel">
        <div class="token-field">
          <span>管理口令</span>
          <input id="tokenInput" type="password" autocomplete="current-password" placeholder="ADMIN_TOKEN" />
        </div>
        <button id="saveTokenButton" type="button" class="btn-primary block">保存口令</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-text">
          <h1 id="viewTitle">概览</h1>
          <p id="viewSubtitle">查看更新状态与设备订阅地址</p>
        </div>
        <div class="topbar-actions">
          <button id="refreshButton" type="button" class="btn-ghost">刷新</button>
          <button id="updateButton" type="button" class="btn-primary">立即更新全部</button>
        </div>
      </header>

      <!-- 概览 -->
      <section class="view" data-view="overview">
        <div class="stat-grid">
          <article class="card stat">
            <span class="stat-label">状态</span>
            <strong id="status">读取中</strong>
            <p id="lastMessage">正在连接服务...</p>
          </article>
          <article class="card stat">
            <span class="stat-label">最近成功</span>
            <strong id="lastSucceededAt">-</strong>
            <p id="publishedBytes">-</p>
          </article>
          <article class="card stat">
            <span class="stat-label">订阅档案</span>
            <strong id="profileCount">-</strong>
            <p>每个客户端使用自己的固定地址。</p>
          </article>
        </div>

        <section class="card">
          <div class="card-head">
            <h2>设备订阅地址</h2>
            <button id="copyAllButton" type="button" class="btn-ghost">复制全部</button>
          </div>
          <div id="profilesList" class="profiles-list"></div>
        </section>
      </section>

      <!-- 机场 -->
      <section class="view" data-view="providers" hidden>
        <section class="card">
          <div class="card-head">
            <h2>机场</h2>
            <button id="addProviderButton" type="button" class="btn-ghost">+ 添加机场</button>
          </div>
          <p class="hint">同一机场下的订阅共用同一套筛选与重命名规则。订阅在“订阅设置”里选择所属机场。</p>
          <div id="providersList" class="providers-list"></div>
        </section>
      </section>

      <!-- 订阅设置 -->
      <section class="view" data-view="settings" hidden>
        <section class="card">
          <div class="card-head">
            <h2>转换设置</h2>
            <button id="saveSettingsButton" type="button" class="btn-primary">保存设置</button>
          </div>
          <div class="settings-grid">
            <label class="field">
              <span>订阅转换地址</span>
              <input id="converterUrlInput" type="url" placeholder="https://sub.dler.io/sub" />
            </label>
            <label class="field">
              <span>分流模板地址</span>
              <input id="templateUrlInput" type="url" placeholder="https://example.com/rules.ini" />
            </label>
            <label class="field">
              <span>转换输入</span>
              <div class="segmented" id="converterInputSegmented">
                <button type="button" data-value="provider-url">直接用机场链接</button>
                <button type="button" data-value="hosted-raw">先下载到 VPS</button>
              </div>
            </label>
            <label class="field">
              <span>额外参数</span>
              <input id="extraParamsInput" type="text" placeholder="emoji=true&udp=true&list=false" />
            </label>
          </div>
        </section>

        <div class="profiles-editor" id="profilesEditor"></div>
      </section>

      <!-- 更新日志 -->
      <section class="view" data-view="logs" hidden>
        <section class="card">
          <div class="card-head">
            <h2>更新日志</h2>
          </div>
          <ol id="logs" class="logs"></ol>
        </section>
      </section>
    </main>

    <script src="/subadmin/app.js" type="module"></script>
  </body>
</html>
